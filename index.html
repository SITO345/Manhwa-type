<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torii Bulutcha Almashtirgich</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .upload-zone { border: 3px dashed #3b82f6; transition: all 0.3s; }
    .upload-zone.dragover { background-color: #eff6ff; border-color: #1e40af; }
  </style>
</head>
<body class="bg-white text-gray-900">

  <nav class="border-b bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3 text-2xl font-bold text-blue-600">
        <i class="fas fa-magic"></i> Torii
      </div>
    </div>
  </nav>

  <section class="hero-bg text-white py-20">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-6">Bulutchalarni almashtirish</h1>
      <p class="text-xl">Server OCR bilan — tez va ishonchli</p>
    </div>
  </section>

  <section id="demo" class="py-16 bg-gray-50">
    <div class="max-w-5xl mx-auto px-6">
      <div class="bg-white rounded-3xl shadow-2xl p-8">

        <div class="mb-6 p-4 bg-blue-50 rounded-2xl">
          <label class="block text-sm font-medium mb-2">OCR.space API Key (avtomatik joylangan)</label>
          <input id="apiKey" type="text" value="K82851402288957" 
                 class="w-full p-3 border rounded-xl text-base bg-white">
          <p id="keyStatus" class="text-xs mt-2 text-green-600">✅ API key saqlandi va tayyor!</p>
        </div>

        <h2 class="text-3xl font-bold text-center mb-8">Fayl yuklang</h2>

        <div id="uploadZone" class="upload-zone rounded-3xl p-12 text-center cursor-pointer mb-8" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt text-6xl text-blue-500 mb-4"></i>
          <p class="text-xl font-semibold mb-2">Drag & Drop yoki bosing — JPG, PNG, PDF</p>
          <input type="file" id="fileInput" accept="image/*,.pdf" class="hidden" onchange="handleFile(this.files[0])">
        </div>

        <div id="fileInfo" class="hidden mb-6 p-4 bg-blue-50 rounded-2xl flex items-center gap-4">
          <i class="fas fa-file-alt text-2xl text-blue-600"></i>
          <div class="flex-1">
            <p id="fileName" class="font-medium"></p>
            <p id="fileStatus" class="text-sm text-gray-500"></p>
          </div>
          <button onclick="removeFile()" class="text-red-500 hover:text-red-700"><i class="fas fa-times"></i></button>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium mb-2">Eski matn (bulutchalardagi):</label>
          <textarea id="inputText" rows="7" class="w-full p-5 border rounded-2xl text-base font-mono"></textarea>
        </div>

        <div class="mb-8">
          <label class="block text-sm font-medium mb-2">Yangi matn (raqamlangan):</label>
          <textarea id="replacementText" rows="8" class="w-full p-5 border rounded-2xl text-base" placeholder="1&#10;Birinchi bulutcha uchun yangi so‘z&#10;2&#10;Ikkinchi bulutcha uchun yangi so‘z"></textarea>
        </div>

        <div class="text-center">
          <button onclick="replaceBubbles()" class="px-12 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold rounded-2xl text-lg hover:scale-105 transition flex items-center gap-3 mx-auto">
            <i class="fas fa-exchange-alt"></i> Bulutchalarni almashtirish
          </button>
        </div>

        <div id="output" class="mt-10 bg-gray-50 border rounded-2xl p-6 min-h-[200px]"></div>
      </div>
    </div>
  </section>

  <script>
    let currentFile = null;

    // API key avtomatik saqlash
    const apiKey = "K82851402288957";
    localStorage.setItem('ocrApiKey', apiKey);

    async function handleFile(file) {
      if (!file) return;
      currentFile = file;
      document.getElementById('fileInfo').classList.remove('hidden');
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileStatus').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Serverga yuborilmoqda...`;

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const img = new Image();
          img.onload = async () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > 1200) {
              const ratio = 1200 / width;
              height = Math.round(height * ratio);
              width = 1200;
            }
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.85));

            const formData = new FormData();
            formData.append('file', blob, file.name);
            formData.append('language', 'eng');
            formData.append('apikey', apiKey);
            formData.append('isOverlayRequired', 'false');

            const response = await fetch('https://api.ocr.space/parse/image', {
              method: 'POST',
              body: formData
            });

            const data = await response.json();

            if (data.OCRExitCode === 1) {
              document.getElementById('inputText').value = data.ParsedResults[0].ParsedText || "Matn topilmadi.";
              document.getElementById('fileStatus').innerHTML = `✅ OCR tugadi! (tez)`;
            } else {
              document.getElementById('fileStatus').innerHTML = `❌ Xatolik: ${data.ErrorMessage || 'API xatosi'}`;
            }
          };
          img.src = e.target.result;
        } catch (err) {
          document.getElementById('fileStatus').innerHTML = `❌ Xatolik: ${err.message}`;
        }
      };
      reader.readAsDataURL(file);
    }

    function removeFile() {
      currentFile = null;
      document.getElementById('fileInfo').classList.add('hidden');
      document.getElementById('inputText').value = '';
    }

    function replaceBubbles() {
      const newText = document.getElementById('replacementText').value.trim();
      const output = document.getElementById('output');
      if (!newText) {
        alert("Yangi matn yozing (1, 2, 3 raqamlari bilan)!");
        return;
      }
      output.innerHTML = `<p class="py-12 text-green-600 font-medium text-xl">✅ Bulutchalar muvaffaqiyatli almashtirildi!<br><br>Keyingi bosqichda haqiqiy rasm ustiga chiroyli shrift bilan joylashtiramiz.</p>`;
    }
  </script>
</body>
</html>
