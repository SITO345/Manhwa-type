<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Torii - Bulutcha Almashtirgich</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .hero-bg { background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%); }
    .upload-zone { border: 3px dashed #3b82f6; transition: all 0.3s; }
    .upload-zone.dragover { background-color: #eff6ff; border-color: #1e40af; }
    canvas { max-width: 100%; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
  </style>
</head>
<body class="bg-white text-gray-900">

  <nav class="border-b bg-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3 text-2xl font-bold text-blue-600">
        <i class="fas fa-magic"></i> Torii
      </div>
    </div>
  </nav>

  <section class="hero-bg text-white py-20">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <h1 class="text-5xl font-bold mb-6">Bulutchalarni almashtirish</h1>
      <p class="text-xl">JPG yuklang — eski matn bulutchalardan o‘chiriladi, yangi matn joylashtiriladi</p>
    </div>
  </section>

  <section id="demo" class="py-16 bg-gray-50">
    <div class="max-w-5xl mx-auto px-6">
      <div class="bg-white rounded-3xl shadow-2xl p-8">

        <div id="uploadZone" class="upload-zone rounded-3xl p-12 text-center cursor-pointer mb-8" onclick="document.getElementById('fileInput').click()">
          <i class="fas fa-cloud-upload-alt text-6xl text-blue-500 mb-4"></i>
          <p class="text-xl font-semibold mb-2">Drag & Drop yoki bosing — JPG, PNG</p>
          <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="handleFile(this.files[0])">
        </div>

        <div id="fileInfo" class="hidden mb-6 p-4 bg-blue-50 rounded-2xl flex items-center gap-4">
          <i class="fas fa-file-alt text-2xl text-blue-600"></i>
          <div class="flex-1">
            <p id="fileName" class="font-medium"></p>
            <p id="fileStatus" class="text-sm text-gray-500"></p>
          </div>
          <button onclick="removeFile()" class="text-red-500"><i class="fas fa-times"></i></button>
        </div>

        <div class="grid md:grid-cols-2 gap-8">
          <div>
            <label class="block text-sm font-medium mb-2">Eski matn (OCR):</label>
            <textarea id="inputText" rows="6" class="w-full p-5 border rounded-2xl text-base font-mono" readonly></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Yangi matn (raqamlangan):</label>
            <textarea id="replacementText" rows="6" class="w-full p-5 border rounded-2xl text-base" placeholder="1&#10;Birinchi bulutcha uchun yangi so‘z&#10;2&#10;Ikkinchi bulutcha..."></textarea>
          </div>
        </div>

        <div class="text-center mt-8">
          <button onclick="replaceBubbles()" class="px-12 py-4 bg-gradient-to-r from-blue-600 to-purple-600 text-white font-semibold rounded-2xl text-lg hover:scale-105 transition flex items-center gap-3 mx-auto">
            <i class="fas fa-exchange-alt"></i> Bulutchalarni almashtirish
          </button>
        </div>

        <div id="resultArea" class="mt-10 hidden">
          <label class="block text-sm font-medium mb-3">Natija (eski matn o‘chirildi, yangi matn joylashtirildi):</label>
          <canvas id="canvas" class="mx-auto"></canvas>
        </div>
      </div>
    </div>
  </section>

  <script>
    let originalImage = null;
    const apiKey = "K82851402288957";

    async function handleFile(file) {
      if (!file) return;
      document.getElementById('fileInfo').classList.remove('hidden');
      document.getElementById('fileName').textContent = file.name;
      document.getElementById('fileStatus').innerHTML = `<i class="fas fa-spinner fa-spin"></i> OCR ishlamoqda...`;

      const reader = new FileReader();
      reader.onload = async (e) => {
        originalImage = new Image();
        originalImage.onload = async () => {
          const formData = new FormData();
          formData.append('file', file);
          formData.append('language', 'eng');
          formData.append('apikey', apiKey);
          formData.append('isOverlayRequired', 'false');

          const res = await fetch('https://api.ocr.space/parse/image', { method: 'POST', body: formData });
          const data = await res.json();

          if (data.OCRExitCode === 1) {
            document.getElementById('inputText').value = data.ParsedResults[0].ParsedText || "Matn topilmadi";
            document.getElementById('fileStatus').innerHTML = `✅ OCR tugadi!`;
          }
        };
        originalImage.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    function removeFile() {
      document.getElementById('fileInfo').classList.add('hidden');
      document.getElementById('inputText').value = '';
      originalImage = null;
      document.getElementById('resultArea').classList.add('hidden');
    }

    function replaceBubbles() {
      const newTextRaw = document.getElementById('replacementText').value.trim();
      if (!newTextRaw || !originalImage) {
        alert("Rasm yuklang va yangi matn yozing!");
        return;
      }

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;

      ctx.drawImage(originalImage, 0, 0);

      const lines = newTextRaw.split(/\n+/).filter(l => l.trim() !== '');

      ctx.font = "bold 58px Arial";
      ctx.textAlign = "center";

      lines.forEach((line, i) => {
        const cleanText = line.replace(/^\d+\s*/, '').trim();
        const x = canvas.width / 2;
        const y = 180 + (i * 160);

        // Oq bulutcha effekti (eski matnni yopish uchun)
        ctx.fillStyle = "rgba(255,255,255,0.98)";
        ctx.beginPath();
        ctx.roundRect(x - 320, y - 85, 640, 130, 30);
        ctx.fill();

        // Yangi matn
        ctx.fillStyle = "#111111";
        ctx.fillText(cleanText, x, y + 15);
      });

      document.getElementById('resultArea').classList.remove('hidden');
    }
  </script>
</body>
</html>
